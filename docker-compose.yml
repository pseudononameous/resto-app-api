version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resto-app-api
    ports:
      - "${API_PORT:-8000}:80"
    env_file: .env
    volumes:
      - api-storage:/var/www/html/storage
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: resto-app-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_DATABASE:-resto_app}
      MYSQL_USER: ${DB_USERNAME:-resto_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-resto_pass}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  api-storage:
  mysql-data:


